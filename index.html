<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vyra Finanzas</title>
<meta name="theme-color" content="#006565">

<!-- PWA (para que el router también sea instalable) -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vyra">
<link rel="apple-touch-icon" href="icons/icon-180.png">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Manrope', system-ui, sans-serif;
    background: #006565;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-mark {
    width: 72px; height: 72px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-v {
    width: 40px; height: 40px;
  }

  .logo-text {
    font-size: 1.5rem;
    font-weight: 800;
    color: white;
    letter-spacing: -0.03em;
  }

  .loader {
    display: flex; gap: 6px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
    40% { transform: scale(1.1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="splash">
  <div class="logo-mark">
    <svg class="logo-v" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polyline points="6,10 20,32 34,10" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="32" r="3.5" fill="#93f993"/>
    </svg>
  </div>
  <span class="logo-text">Vyra Finanzas</span>
  <div class="loader">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<script>
  // Detecta si es dispositivo móvil por user-agent Y por ancho de pantalla
  // El doble criterio evita falsos positivos (ej: tablet en landscape)
  function isMobile() {
    const byAgent = /Android|iPhone|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const byWidth = window.innerWidth < 768;
    return byAgent || byWidth;
  }

  // Pequeña pausa para mostrar el splash antes de redirigir
  setTimeout(() => {
    if (isMobile()) {
      window.location.replace('./mobile.html');
    } else {
      window.location.replace('./desktop.html');
    }
  }, 600);
</script>

</body>
</html>
